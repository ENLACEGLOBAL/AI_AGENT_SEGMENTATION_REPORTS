services:
  ia-report:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: ia_report_generator
    volumes:
      - ../..:/app
    ports:
      - "8000:8000"
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
